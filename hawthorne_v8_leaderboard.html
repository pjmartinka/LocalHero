
<div style="position:relative;width:100%;font-family:monospace">
<canvas id="c" width="700" height="230" style="display:block;width:100%;border-radius:10px;cursor:pointer;image-rendering:pixelated"></canvas>
<div id="nameBox" style="display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(8,20,10,.96);border:1.5px solid #2A6A38;border-radius:10px;padding:18px 24px;text-align:center;min-width:240px">
  <div style="color:#B8F4CC;font-size:14px;font-weight:bold;margin-bottom:4px">GAME OVER</div>
  <div id="nameScore" style="color:#4AB870;font-size:12px;margin-bottom:12px"></div>
  <input id="nameInput" maxlength="16" placeholder="your name" style="background:#0C1E10;border:1px solid #2A6A38;border-radius:5px;color:#B8F4CC;font-family:monospace;font-size:14px;padding:7px 10px;width:148px;text-align:center;outline:none" />
  <br><br>
  <button id="submitBtn" style="background:#2A6A38;border:none;border-radius:5px;color:#B8F4CC;font-family:monospace;font-size:13px;padding:8px 22px;cursor:pointer;margin-right:8px">Submit</button>
  <button id="skipBtn" style="background:#1A2C1E;border:1px solid #2A4A28;border-radius:5px;color:#5A8A68;font-family:monospace;font-size:13px;padding:8px 14px;cursor:pointer">Skip</button>
</div>
</div>
<div style="text-align:center;margin-top:8px;font-size:12px;color:var(--color-text-secondary);font-family:monospace">space / tap to jump &nbsp;•&nbsp; jump the gap when the bridge raises!</div>
<script>
const WEB_APP_URL = 'YOUR_WEB_APP_URL_HERE';

const cv=document.getElementById('c'),ctx=cv.getContext('2d');
const nameBox=document.getElementById('nameBox');
const nameInput=document.getElementById('nameInput');
const nameScore=document.getElementById('nameScore');
const submitBtn=document.getElementById('submitBtn');
const skipBtn=document.getElementById('skipBtn');

const W=700,H=230,GND=175,SPAN=130,TH=60,CM=8;
const PX=85,PH=48,PW=26,GR=0.65,JV=-13.5;
const TOP0=GND-TH,TOPK=GND-TH-CM*2;
function topAt(t){return(1-t)*(1-t)*TOP0+2*(1-t)*t*TOPK+t*t*TOP0;}

let st='title',sc=0,hi=0,spd=5,tick=0,bgX=0,lastOb='';
let obs=[],bgTow=[],seaL=[],nextOb=90,nextTow=360,nextSL=620;
let leaderboard=[],submitting=false;
const P={y:GND-PH,vy:0,j:false,dead:false,fr:0,frt:0};

function showNameBox(){
  nameScore.textContent='score: '+String(sc).padStart(5,'0');
  nameInput.value='';
  nameBox.style.display='block';
  setTimeout(()=>nameInput.focus(),80);
}
function hideNameBox(){nameBox.style.display='none';}

async function submitScore(name){
  submitting=true;
  try{
    const r=await fetch(`${WEB_APP_URL}?score=${sc}&name=${encodeURIComponent(name)}`);
    const d=await r.json();
    if(d.top10) leaderboard=d.top10;
  }catch(e){leaderboard=[];}
  submitting=false;
  st='leaderboard';
}

submitBtn.addEventListener('click',()=>{
  const n=(nameInput.value.trim()||'anonymous').slice(0,16);
  hideNameBox();
  submitScore(n);
});
skipBtn.addEventListener('click',()=>{hideNameBox();st='title';});
nameInput.addEventListener('keydown',e=>{
  if(e.key==='Enter'){submitBtn.click();}
  if(e.key==='Escape'){skipBtn.click();}
  e.stopPropagation();
});

function jump(){
  if(st==='leaderboard'){st='title';return;}
  if(st==='title'){reset();return;}
  if(st==='dead'||submitting) return;
  if(!P.j){P.vy=JV;P.j=true;}
}
document.addEventListener('keydown',e=>{
  if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();jump();}
});
cv.addEventListener('click',jump);
cv.addEventListener('touchstart',e=>{e.preventDefault();jump();});

function reset(){
  st='playing';sc=0;spd=5;tick=0;bgX=0;lastOb='';
  obs=[];bgTow=[];seaL=[];nextOb=90;nextTow=360;nextSL=620;
  Object.assign(P,{y:GND-PH,vy:0,j:false,dead:false,fr:0,frt:0});
}

const OTYPES=['bike','cone','pigeon','spoon','bigdog','djacket','bgirl'];
const ODIMS={bike:{w:46,h:36},cone:{w:22,h:30},pigeon:{w:34,h:22},
             spoon:{w:14,h:44},bigdog:{w:68,h:46},djacket:{w:22,h:48},bgirl:{w:24,h:44}};
function mkOb(){
  if(Math.random()<0.14&&!obs.some(o=>o.t==='gap')&&sc>25)
    return{t:'gap',x:W+20,y:GND-10,w:58,h:14};
  let t=OTYPES[Math.floor(Math.random()*OTYPES.length)];
  if(t===lastOb) t=OTYPES[(OTYPES.indexOf(t)+1+Math.floor(Math.random()*(OTYPES.length-1)))%OTYPES.length];
  lastOb=t;
  const d=ODIMS[t];
  return{t,x:W+30,y:GND-d.h,w:d.w,h:d.h};
}

/* ── SKY ── */
function drawSky(){
  ctx.fillStyle='#B0CCE0';ctx.fillRect(0,0,W,GND);
  ctx.fillStyle='#C2D8E8';ctx.fillRect(0,0,W,50);
  function cloud(cx,cy,s){
    ctx.fillStyle='#D6E6EE';
    ctx.beginPath();ctx.arc(cx,cy,s,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(cx+s*1.42,cy+s*.2,s*.88,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(cx-s*1.1,cy+s*.3,s*.7,0,Math.PI*2);ctx.fill();
    ctx.fillRect(cx-s*1.1,cy+s*.22,s*3.5,s*.88);
  }
  [[180,30,12],[440,20,10],[700,36,9],[960,28,11],[1180,33,9]].forEach(([x,y,s])=>{
    cloud(((x-bgX*.055)%1440+1440)%1440-160,y,s);
  });
  const mhx=((440-bgX*.13)%1440+1440)%1440-110;
  ctx.fillStyle='#C4D8E4';ctx.beginPath();ctx.moveTo(mhx,GND);ctx.lineTo(mhx+70,GND-78);ctx.lineTo(mhx+114,GND);ctx.closePath();ctx.fill();
  ctx.fillStyle='#DAE8F0';ctx.beginPath();ctx.moveTo(mhx+70,GND-78);ctx.lineTo(mhx+58,GND-60);ctx.lineTo(mhx+86,GND-65);ctx.closePath();ctx.fill();
  const BD=[[0,33,55],[37,17,75],[58,43,47],[104,23,84],[131,13,62],[148,37,58],[188,27,38],
    [219,47,67],[270,19,55],[293,33,44],[329,23,62],[356,13,38],[372,39,50],[414,25,76],
    [443,17,46],[463,45,60],[511,21,55],[536,31,38],[570,15,66],[589,37,48],[629,25,72],[657,33,42],[694,19,56]];
  for(let r=0;r<3;r++) BD.forEach(([bx,bw,bh])=>{
    const xx=((bx+r*716-bgX*.38)%(716*2)+716*2)%(716*2)-72;
    if(xx>-76&&xx<W+5){
      ctx.fillStyle='#4A5A6C';ctx.fillRect(xx,GND-bh,bw,bh);
      for(let wy=GND-bh+7;wy<GND-7;wy+=11) for(let wx=xx+3;wx<xx+bw-4;wx+=8){
        ctx.fillStyle=Math.sin(wx*13+wy*7)>.12?'#607890':'#4A5A6C';ctx.fillRect(wx,wy,4,5);
      }
    }
  });
}

const RIVER_TOP=GND+14,SEA_LIFE=240;
function drawRiver(){
  ctx.fillStyle='#385E72';ctx.fillRect(0,RIVER_TOP,W,H-RIVER_TOP);
  for(let rx=(bgX*.24)%58-58;rx<W;rx+=58){
    ctx.fillStyle='#456E82';ctx.fillRect(rx,RIVER_TOP+5,35,3);ctx.fillRect(rx+14,RIVER_TOP+12,22,2);
  }
  seaL.forEach(sl=>{
    let em=sl.life<50?sl.life/50:sl.life<SEA_LIFE-60?1:(SEA_LIFE-sl.life)/60;
    em=Math.max(0,Math.min(1,em));
    const by=RIVER_TOP+14-em*6+Math.sin(tick*.07+sl.ph)*3*em,bx=sl.x;
    ctx.save();ctx.globalAlpha=Math.min(1,em*2.5);
    ctx.beginPath();ctx.rect(bx-28,RIVER_TOP,60,H-RIVER_TOP);ctx.clip();
    ctx.fillStyle='#4E3C28';ctx.beginPath();ctx.ellipse(bx,by+4,15,6.5,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#5E4C38';ctx.beginPath();ctx.arc(bx+13,by,5.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#6A5840';ctx.beginPath();ctx.ellipse(bx+17,by+1,3.5,2.5,.2,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#1A1008';ctx.beginPath();ctx.arc(bx+14,by-1,1.4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#F0F0F0';ctx.beginPath();ctx.arc(bx+14.6,by-1.5,.6,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#A89870';ctx.lineWidth=.8;ctx.lineCap='round';
    [[bx+17,by+1,bx+24,by-.5],[bx+17,by+1.5,bx+24,by+1.5],[bx+17,by+2,bx+24,by+3.5]].forEach(([x1,y1,x2,y2])=>{ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();});
    ctx.fillStyle='#3E2C18';ctx.beginPath();ctx.ellipse(bx+3,by+9,6.5,3,.6,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(bx-11,by+5,5.5,2.8,-.3,0,Math.PI*2);ctx.fill();
    ctx.restore();
  });
}

function drawTower(cx,showGap,gapW){
  const colW=8,iG=46,Lx=cx-iG/2-colW,Rx=cx+iG/2,midX=(Lx+colW+Rx)/2;
  const topY=GND-124,baseY=GND+4;
  [Lx,Rx].forEach(col=>{
    ctx.fillStyle='#1A2820';ctx.fillRect(col,topY,colW,baseY-topY);
    ctx.strokeStyle='#111C18';ctx.lineWidth=.85;
    for(let y=topY;y<baseY;y+=13){ctx.beginPath();ctx.moveTo(col,y);ctx.lineTo(col+colW,y+13);ctx.stroke();ctx.beginPath();ctx.moveTo(col+colW,y);ctx.lineTo(col,y+13);ctx.stroke();}
  });
  ctx.strokeStyle='#1A2820';ctx.lineWidth=2.2;
  for(let y=topY+9;y<baseY-6;y+=20){ctx.beginPath();ctx.moveTo(Lx+colW,y);ctx.lineTo(Rx,y);ctx.stroke();}
  ctx.strokeStyle='#263C32';ctx.lineWidth=2;ctx.lineCap='butt';
  const s1b=baseY-8,s1t=baseY-36;
  ctx.beginPath();ctx.moveTo(Lx+colW,s1b);ctx.lineTo(midX,s1t);ctx.stroke();ctx.beginPath();ctx.moveTo(midX,s1b);ctx.lineTo(midX,s1t);ctx.stroke();ctx.beginPath();ctx.moveTo(midX,s1t);ctx.lineTo(Rx,s1b);ctx.stroke();
  const s2b=baseY-40,s2t=baseY-68;
  ctx.beginPath();ctx.moveTo(Lx+colW,s2b);ctx.lineTo(midX,s2t);ctx.stroke();ctx.beginPath();ctx.moveTo(midX,s2b);ctx.lineTo(midX,s2t);ctx.stroke();ctx.beginPath();ctx.moveTo(midX,s2t);ctx.lineTo(Rx,s2b);ctx.stroke();
  ctx.lineWidth=1.4;ctx.strokeStyle='#263C2C';
  for(let y=topY+9;y<baseY-72;y+=20){ctx.beginPath();ctx.moveTo(Lx+colW,y);ctx.lineTo(Rx,y+20);ctx.stroke();ctx.beginPath();ctx.moveTo(Rx,y);ctx.lineTo(Lx+colW,y+20);ctx.stroke();}
  const cwW=iG+colW*2+6,cwH=30,cwX=cx-cwW/2;
  ctx.fillStyle='#902C10';ctx.fillRect(cwX,topY-cwH,cwW,cwH);ctx.fillStyle='#BC4020';ctx.fillRect(cwX+3,topY-cwH+3,cwW-6,cwH-6);
  ctx.strokeStyle='#6E1E08';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(cwX+cwW/3,topY-cwH);ctx.lineTo(cwX+cwW/3,topY);ctx.stroke();ctx.beginPath();ctx.moveTo(cwX+cwW*2/3,topY-cwH);ctx.lineTo(cwX+cwW*2/3,topY);ctx.stroke();
  ctx.fillStyle='#0E1810';ctx.fillRect(cwX-2,topY,cwW+4,5);
  if(showGap&&gapW>0){
    const hw=gapW/2,spanY=topY-cwH-26;
    ctx.strokeStyle='rgba(26,40,30,.55)';ctx.lineWidth=1.5;ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.moveTo(Lx+colW,topY-cwH+2);ctx.lineTo(cx-hw,spanY+8);ctx.stroke();ctx.beginPath();ctx.moveTo(Rx,topY-cwH+2);ctx.lineTo(cx+hw,spanY+8);ctx.stroke();
    ctx.setLineDash([]);ctx.fillStyle='#1A2820';ctx.fillRect(cx-hw,spanY,gapW,8);
    ctx.strokeStyle='#263C2C';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(cx-hw,spanY);ctx.quadraticCurveTo(cx,spanY-12,cx+hw,spanY);ctx.stroke();
    ctx.lineWidth=1.5;[1/3,2/3].forEach(t=>{const vx=(cx-hw+gapW*t)|0;ctx.beginPath();ctx.moveTo(vx,spanY+8);ctx.lineTo(vx,(spanY-12*4*t*(1-t))|0);ctx.stroke();});
    ctx.fillStyle='#162C3A';ctx.fillRect(cx-hw,GND,gapW,16);
    for(let rx=cx-hw+5;rx<cx+hw-12;rx+=14){ctx.fillStyle='#203848';ctx.fillRect(rx,GND+8,9,3);}
    for(let i=0;i<3;i++){ctx.fillStyle=i%2?'#161616':'#E89408';ctx.fillRect(cx-hw-18+i*7,GND-5,6,6);ctx.fillRect(cx+hw+1+i*7,GND-5,6,6);}
  }
}

function drawTruss(){
  const s0=-(bgX%SPAN)-SPAN*2;ctx.lineCap='butt';
  for(let px=s0;px<W+SPAN;px+=SPAN){
    const nx=px+SPAN,mx=(px+nx)/2;
    ctx.strokeStyle='#16241A';ctx.lineWidth=3.5;ctx.beginPath();ctx.moveTo(px,GND);ctx.lineTo(px,TOP0);ctx.stroke();
    ctx.strokeStyle='#16241A';ctx.lineWidth=2.5;ctx.beginPath();ctx.moveTo(px,TOP0);ctx.quadraticCurveTo(mx,TOPK,nx,TOP0);ctx.stroke();
    ctx.strokeStyle='#1E301E';ctx.lineWidth=2;
    [1/3,2/3].forEach(t=>{const vx=(px+SPAN*t)|0,vy=topAt(t)|0;ctx.beginPath();ctx.moveTo(vx,GND);ctx.lineTo(vx,vy);ctx.stroke();});
    [[0,1/3],[1/3,2/3],[2/3,1]].forEach(([t0,t1])=>{
      ctx.strokeStyle='#1E301E';ctx.lineWidth=1.7;ctx.beginPath();ctx.moveTo((px+SPAN*t0)|0,GND);ctx.lineTo((px+SPAN*t1)|0,topAt(t1)|0);ctx.stroke();
      ctx.strokeStyle='rgba(22,36,26,.38)';ctx.lineWidth=1.1;ctx.beginPath();ctx.moveTo((px+SPAN*t0)|0,topAt(t0)|0);ctx.lineTo((px+SPAN*t1)|0,GND);ctx.stroke();
    });
  }
  ctx.strokeStyle='#16241A';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(0,GND-12);ctx.lineTo(W,GND-12);ctx.stroke();ctx.beginPath();ctx.moveTo(0,GND-6);ctx.lineTo(W,GND-6);ctx.stroke();
  for(let px=-(bgX%20)|0;px<W;px+=20){ctx.beginPath();ctx.moveTo(px,GND-12);ctx.lineTo(px,GND);ctx.stroke();}
  ctx.fillStyle='#3C4840';ctx.fillRect(0,GND,W,14);ctx.fillStyle='#222018';ctx.fillRect(0,GND,W,3);
}

function drawPlayer(){
  const x=PX,y=P.y,d=P.dead,f=P.fr,ls=d?0:Math.sin(f*Math.PI/1.5)*9;
  ctx.lineCap='round';
  ctx.fillStyle='#2C1404';ctx.beginPath();ctx.arc(x+13,y+7,11.5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(x+2,y+17,3.5,10,.12,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(x+24,y+17,3.5,10,-.12,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#0A0A0A';ctx.fillRect(x-6,y+13,12,22);ctx.fillStyle='#1E1E1E';ctx.fillRect(x-4,y+15,8,3);
  ctx.fillStyle='#257818';ctx.fillRect(x+13,y+30,8,16+Math.max(0,-ls));ctx.fillStyle='#0E0E0E';ctx.fillRect(x+11,y+46+Math.max(0,-ls),10,4);
  ctx.fillStyle='#EEECD8';ctx.fillRect(x+4,y+14,18,18);
  ctx.fillStyle='#2A8A18';ctx.fillRect(x+7,y+15,12,14);ctx.strokeStyle='#1A6010';ctx.lineWidth=1;ctx.strokeRect(x+9,y+18,5,5);
  ctx.fillStyle='#2A8A18';ctx.fillRect(x+6,y+8,3,8);ctx.fillRect(x+17,y+8,3,8);
  ctx.fillStyle='#257818';ctx.fillRect(x+7,y+30,8,16+Math.max(0,ls));ctx.fillStyle='#0E0E0E';ctx.fillRect(x+5,y+46+Math.max(0,ls),10,4);
  ctx.strokeStyle='#DBBCAA';ctx.lineWidth=4;
  if(!d){const as=Math.sin(f*Math.PI/1.5)*7;ctx.beginPath();ctx.moveTo(x+5,y+18);ctx.lineTo(x-4,y+28+as);ctx.stroke();ctx.beginPath();ctx.moveTo(x+21,y+18);ctx.lineTo(x+28,y+28-as);ctx.stroke();}
  else{ctx.beginPath();ctx.moveTo(x+5,y+18);ctx.lineTo(x-5,y+22);ctx.stroke();ctx.beginPath();ctx.moveTo(x+21,y+18);ctx.lineTo(x+30,y+13);ctx.stroke();}
  ctx.fillStyle='#EDD8CC';ctx.fillRect(x+10,y+10,7,6);
  ctx.fillStyle='#F0DBD0';ctx.beginPath();ctx.arc(x+13,y+7,10,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#2C1404';ctx.beginPath();ctx.arc(x+13,y+7,10.5,Math.PI,0,false);ctx.fill();
  ctx.fillStyle='#1A0800';ctx.beginPath();ctx.arc(x+13,y+4,2.5,Math.PI,0,false);ctx.fill();
  if(!d){
    ctx.fillStyle='#0E0A06';ctx.beginPath();ctx.arc(x+9,y+9,2.3,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(x+17,y+9,2.3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#2A7832';ctx.beginPath();ctx.arc(x+9,y+9,1.55,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(x+17,y+9,1.55,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#080605';ctx.beginPath();ctx.arc(x+9,y+9,.85,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(x+17,y+9,.85,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.92)';ctx.beginPath();ctx.arc(x+9.6,y+8.3,.65,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(x+17.6,y+8.3,.65,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#A06040';ctx.lineWidth=1.3;ctx.lineCap='butt';ctx.beginPath();ctx.arc(x+13,y+12.5,3.5,.25,Math.PI-.25);ctx.stroke();
    ctx.fillStyle='rgba(180,90,50,.5)';[[x+6.5,y+12],[x+9,y+13.5],[x+14.5,y+13.5],[x+17,y+12]].forEach(([fx,fy])=>{ctx.beginPath();ctx.arc(fx,fy,1.1,0,Math.PI*2);ctx.fill();});
    ctx.fillStyle='rgba(160,80,50,.33)';ctx.beginPath();ctx.arc(x+13,y+10.8,1.2,0,Math.PI*2);ctx.fill();
  } else {
    ctx.strokeStyle='#1A0F08';ctx.lineWidth=1.8;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(x+6,y+7);ctx.lineTo(x+11,y+11);ctx.moveTo(x+11,y+7);ctx.lineTo(x+6,y+11);ctx.stroke();
    ctx.beginPath();ctx.moveTo(x+15,y+7);ctx.lineTo(x+20,y+11);ctx.moveTo(x+20,y+7);ctx.lineTo(x+15,y+11);ctx.stroke();
  }
}

function dogShape(dx,dy,ph){
  ctx.fillStyle='#F2F2F0';ctx.beginPath();ctx.ellipse(dx+7,dy+5,8,4.5,.1,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(dx+13,dy+1,4.5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#DCDCDA';ctx.beginPath();ctx.ellipse(dx+10,dy-3,2,3.5,-.3,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(dx+16,dy-2,2,3.5,.3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#1A1010';ctx.beginPath();ctx.arc(dx+14,dy,1.2,0,Math.PI*2);ctx.fill();ctx.fillStyle='#2A1818';ctx.beginPath();ctx.arc(dx+17,dy+1.5,1.4,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#DEDED8';[dx+2,dx+5,dx+9,dx+12].forEach((lx,i)=>{ctx.fillRect(lx,dy+9,3,4+(Math.sin(ph+i*Math.PI/2)*2|0));});
  ctx.strokeStyle='#E8E8E4';ctx.lineWidth=1.5;ctx.lineCap='round';ctx.beginPath();ctx.arc(dx+1,dy+3,3.5,-.3,Math.PI*.5,true);ctx.stroke();
}
function drawBigDog(x,y){
  const yo=y+6,ph=Math.sin(x*.07);
  dogShape(x+1,yo+28,ph*2);dogShape(x+16,yo+26,-ph*2);
  ctx.strokeStyle='#888878';ctx.lineWidth=1;ctx.lineCap='butt';ctx.beginPath();ctx.moveTo(x+38,yo+27);ctx.lineTo(x+14,yo+29);ctx.stroke();ctx.beginPath();ctx.moveTo(x+38,yo+27);ctx.lineTo(x+29,yo+27);ctx.stroke();
  const mx=x+37;
  ctx.fillStyle='#1A2840';ctx.fillRect(mx+2,yo+29,10,15+(ph*4|0));ctx.fillRect(mx+13,yo+29,10,15-(ph*4|0));
  ctx.fillStyle='#0E0E18';ctx.fillRect(mx,yo+44+(ph*4|0),14,4);ctx.fillRect(mx+11,yo+44-(ph*4|0),14,4);
  ctx.fillStyle='#8A3C1C';ctx.fillRect(mx-2,yo+15,28,16);ctx.fillStyle='#7A3018';ctx.beginPath();ctx.arc(mx+12,yo+29,9,0,Math.PI*2);ctx.fill();ctx.fillStyle='#8A3C1C';ctx.fillRect(mx-2,yo+15,28,13);

/* ── TITLE ── */
function drawTitle(){
  ctx.fillStyle='rgba(6,16,8,0.82)';ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';ctx.lineCap='butt';
  ctx.fillStyle='#081808';ctx.font='bold 40px monospace';ctx.fillText('LOCAL HERO',W/2+2,88);
  ctx.fillStyle='#B8F4CC';ctx.font='bold 40px monospace';ctx.fillText('LOCAL HERO',W/2,86);
  const uw=168;ctx.fillStyle='#2A7A3C';ctx.fillRect(W/2-uw/2,92,uw,2);
  ctx.fillStyle='#3A6A48';ctx.font='11px monospace';ctx.fillText('a hawthorne bridge runner',W/2,110);
  if(hi>0){ctx.fillStyle='#2A6A38';ctx.font='11px monospace';ctx.fillText('best: '+String(hi).padStart(5,'0'),W/2,126);}
  if(Math.sin(tick*.09)>0){ctx.fillStyle='#7ACCAA';ctx.font='bold 12px monospace';ctx.fillText('PRESS SPACE  ·  TAP TO START',W/2,150);}
}

/* ── LEADERBOARD ── */
function drawLeaderboard(){
  ctx.fillStyle='rgba(6,16,8,0.93)';ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';ctx.lineCap='butt';
  ctx.fillStyle='#B8F4CC';ctx.font='bold 15px monospace';ctx.fillText('LEADERBOARD',W/2,28);
  ctx.fillStyle='#2A6A38';ctx.fillRect(W/2-120,33,240,1);
  if(submitting){
    ctx.fillStyle='#4AB870';ctx.font='12px monospace';ctx.fillText('submitting…',W/2,H/2);return;
  }
  if(!leaderboard.length){
    ctx.fillStyle='#4AB870';ctx.font='11px monospace';ctx.fillText('no scores yet — be the first local hero!',W/2,H/2);
  } else {
    leaderboard.forEach((r,i)=>{
      const yy=52+i*17;const medal=['🥇','🥈','🥉'][i]||' ';
      ctx.fillStyle=i===0?'#F0D060':i===1?'#C0C8D0':i===2?'#C8906A':'#4AB870';
      ctx.font=(i<3?'bold ':'')+'12px monospace';
      ctx.textAlign='right';ctx.fillText(String(i+1).padStart(2,' ')+'.',W/2-88,yy);
      ctx.textAlign='left';ctx.fillText(r.name,W/2-80,yy);
      ctx.textAlign='right';ctx.fillText(String(r.score).padStart(5,' '),W/2+118,yy);
    });
  }
  if(Math.sin(tick*.07)>0){ctx.fillStyle='#3A7A50';ctx.font='11px monospace';ctx.textAlign='center';ctx.fillText('tap or space to play again',W/2,H-14);}
}

/* ── HUD ── */
function hud(){
  if(st==='title'||st==='leaderboard') return;
  ctx.lineCap='butt';ctx.font='bold 13px monospace';ctx.textAlign='right';ctx.fillStyle='#0E1C10';
  ctx.fillText('HI '+String(hi).padStart(5,'0')+'  '+String(sc).padStart(5,'0'),W-14,21);
}

function hit(ob){const p=7;return PX+p<ob.x+ob.w-p&&PX+PW-p>ob.x+p&&P.y+p<ob.y+ob.h&&P.y+PH-p>ob.y;}

function loop(){
  tick++;
  if(st==='title') bgX+=0.9;
  else if(st==='playing'){
    sc=Math.floor(tick/6);spd=5+Math.floor(sc/280)*.5;bgX+=spd;
    P.vy+=GR;P.y+=P.vy;
    if(P.y>=GND-PH){P.y=GND-PH;P.vy=0;P.j=false;}
    if(!P.j&&!P.dead){P.frt++;if(P.frt%7===0)P.fr=(P.fr+1)%4;}
    if(--nextOb<=0){obs.push(mkOb());nextOb=68+Math.floor(Math.random()*88);}
    obs.forEach(o=>o.x-=spd);obs=obs.filter(o=>o.x>-160);
    if(--nextTow<=0){bgTow.push({x:W+55});nextTow=350+Math.floor(Math.random()*220);}
    bgTow.forEach(t=>t.x-=spd*.8);bgTow=bgTow.filter(t=>t.x>-120);
    if(--nextSL<=0){seaL.push({x:80+Math.random()*(W-160),ph:Math.random()*Math.PI*2,life:0});nextSL=480+Math.floor(Math.random()*520);}
    seaL.forEach(s=>s.life++);seaL=seaL.filter(s=>s.life<SEA_LIFE);
    if(!P.dead) for(const o of obs){if(hit(o)){st='dead';P.dead=true;if(sc>hi)hi=sc;setTimeout(showNameBox,350);break;}}
  }
  ctx.clearRect(0,0,W,H);ctx.lineCap='butt';ctx.setLineDash([]);
  drawSky();bgTow.forEach(t=>drawTower(t.x,false,0));drawRiver();drawTruss();
  if(st!=='title'&&st!=='leaderboard'){
    obs.filter(o=>o.t!=='gap').forEach(drawObs);obs.filter(o=>o.t==='gap').forEach(drawObs);drawPlayer();
  }
  hud();
  if(st==='title') drawTitle();
  else if(st==='leaderboard') drawLeaderboard();
  requestAnimationFrame(loop);
}
loop();
</script>
